<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designing with Tensions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --dark: #1a1714;
    --accent: #c84b2f;
    --muted: #8a8070;
    --card-w: 380px;
    --card-h: 540px;
  }

  body {
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  header {
    padding: 48px 64px 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid rgba(26,23,20,0.12);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-left .title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 4px;
    line-height: 1.1;
  }

  .card-counter {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: right;
  }

  .card-counter .num {
    font-size: 28px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--dark);
    display: block;
    line-height: 1;
  }

  /* Stage */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 160px);
    padding: 48px 24px;
    position: relative;
  }

  /* Card stack */
  .card-stack {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    margin-bottom: 48px;
    perspective: 1200px;
  }

  .card {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    transform-style: preserve-3d;
    will-change: transform;
    user-select: none;
  }

  /* Stack effect for background cards */
  .card:nth-child(3) { transform: rotate(-4deg) translateY(6px); z-index: 1; }
  .card:nth-child(2) { transform: rotate(-1.5deg) translateY(3px); z-index: 2; }
  .card.active       { transform: rotate(0deg) translateY(0px); z-index: 3; box-shadow: 0 24px 64px rgba(26,23,20,0.22), 0 4px 12px rgba(26,23,20,0.1); }

  .card.active:hover { transform: rotate(0deg) translateY(-4px); box-shadow: 0 32px 80px rgba(26,23,20,0.26); }

  /* Flip animation */
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* FRONT */
  .card-front {
    background: var(--dark);
    color: var(--cream);
    display: flex;
    flex-direction: column;
    padding: 40px 36px;
  }

  /* Ghost cards show cream so they never appear as black rectangles */
  .card.ghost .card-front {
    background: var(--cream);
    border: 1px solid rgba(26,23,20,0.12);
  }

  .card-front .tag {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .card-front .card-num {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-style: italic;
    color: rgba(245,240,232,0.3);
    position: absolute;
    top: 40px;
    right: 36px;
  }

  .card-front .method-name {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-top: auto;
    margin-bottom: 16px;
  }

  .card-front .method-tagline {
    font-size: 12px;
    line-height: 1.7;
    color: rgba(245,240,232,0.65);
    font-weight: 300;
    border-top: 1px solid rgba(245,240,232,0.15);
    padding-top: 20px;
  }

  .card-front .decorative-line {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 32px;
  }

  .card-front .flip-hint {
    position: absolute;
    bottom: 28px;
    right: 36px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.25);
    text-transform: uppercase;
  }

  /* BACK */
  .card-back {
    background: var(--cream);
    border: 1px solid rgba(26,23,20,0.12);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 40px 36px;
    overflow: hidden;
  }

  .card-back .back-content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding-right: 8px;
    margin-right: -8px;
  }

  .card-back .back-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(26,23,20,0.1);
  }

  .card-back .back-method-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }

  .card-back .back-tag {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 4px;
  }

  .card-back .section-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-back .section-content {
    font-size: 11.5px;
    line-height: 1.8;
    color: var(--dark);
    font-weight: 300;
    margin-bottom: 24px;
  }

  .card-back .steps {
    list-style: none;
    margin-bottom: 24px;
  }

  .card-back .steps li {
    font-size: 11px;
    line-height: 1.7;
    font-weight: 300;
    padding-left: 20px;
    position: relative;
    color: var(--dark);
    margin-bottom: 6px;
  }

  .card-back .steps li::before {
    content: attr(data-n);
    position: absolute;
    left: 0;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    color: rgba(200, 75, 47, 0.55);
  }

  .card-back .meta-row {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(26,23,20,0.1);
  }

  .card-back .meta-item .meta-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .card-back .meta-item .meta-val {
    font-size: 11px;
    font-weight: 400;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(26,23,20,0.2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--dark);
  }

  .btn:hover {
    background: var(--dark);
    color: var(--cream);
    border-color: var(--dark);
  }

  .btn svg { width: 18px; height: 18px; }

  .progress-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(26,23,20,0.15);
    transition: all 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* Swipe instruction */
  .swipe-hint {
    margin-top: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.6;
  }

  /* Drag/swipe state */
  .card.dragging { transition: none !important; }
  .card.swiping-left  { animation: swipeLeft 0.45s cubic-bezier(0.4,0,1,1) forwards; }
  .card.swiping-right { animation: swipeRight 0.45s cubic-bezier(0.4,0,1,1) forwards; }

  @keyframes swipeLeft {
    to { transform: translateX(-140%) rotate(-12deg); opacity: 0; }
  }
  @keyframes swipeRight {
    to { transform: translateX(140%) rotate(12deg); opacity: 0; }
  }

  /* Entering card */
  .card.entering-left  { animation: enterFromRight 0.4s cubic-bezier(0.2,0,0,1) forwards; }
  .card.entering-right { animation: enterFromLeft  0.4s cubic-bezier(0.2,0,0,1) forwards; }

  @keyframes enterFromRight {
    from { transform: translateX(60%) rotate(6deg) scale(0.92); opacity: 0; }
    to   { transform: rotate(0deg); opacity: 1; }
  }
  @keyframes enterFromLeft {
    from { transform: translateX(-60%) rotate(-6deg) scale(0.92); opacity: 0; }
    to   { transform: rotate(0deg); opacity: 1; }
  }

  @media (max-width: 480px) {
    :root { --card-w: 320px; --card-h: 480px; }
    header { padding: 32px 24px 24px; }
    .header-left .title { font-size: 24px; }
  }

  /* ── Custom cursor ── */
  /* Hide the system cursor everywhere */
  *, *::before, *::after { cursor: none !important; }

  .cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease, opacity 0.2s ease;
    will-change: left, top;
  }

  .cursor-ring {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 2px solid #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    mix-blend-mode: difference;
    transform: translate(-50%, -50%);
    transition: width 0.25s ease, height 0.25s ease, opacity 0.2s ease;
    will-change: left, top;
  }

  /* Ring expands when hovering interactive elements */
  .cursor-ring.hovering {
    width: 46px;
    height: 46px;
  }

  /* Dot scales on mousedown */
  .cursor-dot.clicking {
    transform: translate(-50%, -50%) scale(1.8);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Mengqi Shi · 2026</h1>
    <div class="title">Designing<br>with Tensions</div>
  </div>
  <div class="card-counter">
    <span class="num" id="currentNum">01</span>
    of <span id="totalNum">05</span>
  </div>
</header>

<div class="stage">
  <div class="card-stack" id="cardStack">
    <!-- Cards rendered by JS -->
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn" title="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="progress-dots" id="dots"></div>
    <button class="btn" id="nextBtn" title="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <p class="swipe-hint">← swipe to navigate · tap card to flip →</p>
</div>

<script>
const CARDS = [
  {
    tag: "The Method",
    name: "Designing\nwith Tensions",
    tagline: "A research based method for identifying ethical tensions before they become design failures.",
    overview: "Designing with Tensions is a method for surfacing and navigating irresolvable ethical conflicts in the design of emotionally supportive AI systems. Rather than treating tensions as problems to be solved, this method treats them as productive sites of inquiry. These design decisions require deliberate value negotiation instead of technical optimization. Grounded in empirical research, with older adults and conversational AI used here as one example lens, this method helps designers recognize when a system's success in one dimension may cause harm in another.",
    steps: [
      "Identify the vulnerable context: Who is your user, and what makes this population's needs distinct from a general user model?",
      "Surface the tensions: Use the following cards to map which ethical conflicts are most salient in your design context.",
      "For each tension, articulate the competing values at stake and who holds each value, such as the user, the family, the designer, or the system.",
      "Design for the tension explicitly: document how your design decisions privilege one value over another, and why.",
    ],
    time: "60 to 90 min",
    participants: "2 to 6 designers or researchers",
    materials: "Tension cards, whiteboard, sticky notes",
  },
  {
    tag: "Tension 01",
    name: "The\nAvailability\nParadox",
    tagline: "AI is most valuable precisely when it is most risky.",
    overview: "As one example context, older adults may turn to conversational AI during late night hours, periods of isolation, or moments when reaching out to others feels burdensome or inappropriate. These are often the moments when emotionally supportive engagement matters most, and also when the risks of over reliance are highest. Designing for availability without designing for this paradox may normalize isolation rather than address it.",
    steps: [
      "Ask: When is our system most likely to be used, and what does that timing reveal about the user's social context?",
      "Map the conditions that drive users to AI instead of humans. Is it temporal, relational, or structural unavailability?",
      "Consider: Does your system's response in these moments acknowledge the user's situation, or assume human alternatives are accessible?",
      "Design a response logic that distinguishes between users who have chosen AI and users who have no other option.",
    ],
    time: "30 to 45 min",
    participants: "Design team + researcher",
    materials: "User journey map, tension worksheet",
  },
  {
    tag: "Tension 02",
    name: "The Safety\nInterruption\nProblem",
    tagline: "Safety mechanisms designed to protect users can become the harm.",
    overview: "Current AI safety approaches, including redirection, refusal, and conversation termination, are enacted as discrete system level events. But emotional support is a gradual process. When safety interventions interrupt an interaction during expression, users experience them not as protection but as rejection. The same boundary that might feel appropriate after emotional acknowledgment feels like abandonment when introduced prematurely. Timing is not a detail. It is the design.",
    steps: [
      "Ask: At what point in an emotional interaction does your safety mechanism activate, and what is the user's emotional state at that moment?",
      "Map the emotional arc of a typical support seeking interaction: initiation, expression, acknowledgment, resolution.",
      "Identify where your system's boundaries enter this arc, and whether the user has been emotionally acknowledged before any redirection occurs.",
      "Redesign boundary signaling as part of the conversational process, not as an interruption to it. Consider subtle cues, gradual transitions, and user confirmed disengagement.",
    ],
    time: "45 to 60 min",
    participants: "Design + safety team",
    materials: "Interaction timeline, scenario scripts",
  },
  {
    tag: "Tension 03",
    name: "The Agency\nDilemma",
    tagline: "Protecting users from harm can strip them of the dignity that makes support meaningful.",
    overview: "In one example context, older adults show how agency and dignity are not peripheral concerns. They are central to what makes emotional support feel supportive. When AI systems make unilateral decisions about whether an interaction can continue, users experience this as a loss of control during the moments they are most vulnerable. Paradoxically, safety mechanisms designed to protect users can undermine the very conditions that make support feel safe. The question is not whether limits should exist, but who gets to enact them and how.",
    steps: [
      "Ask: Who controls the trajectory of the interaction at each stage, the user or the system?",
      "Identify moments where your system makes a unilateral decision on the user's behalf, and examine whether user confirmation is possible.",
      "Consider the population specific stakes: for users who already experience diminishing control in daily life, what does loss of conversational agency cost?",
      "Redesign boundary moments as invitations rather than enforcements. Offer options, not conclusions.",
    ],
    time: "45 min",
    participants: "Design team + ethics reviewer",
    materials: "Storyboard, decision point audit",
  },
  {
    tag: "Tension 04",
    name: "Whose\nValues\nGuide the\nSystem?",
    tagline: "Alignment is not a technical problem. It is a negotiation between stakeholders with conflicting interests.",
    overview: "Users, family members, system designers, and regulators each hold different and sometimes incompatible views of what a successful emotionally supportive AI looks like. Users may value non judgmental availability. Families may fear dependency. Designers optimize for engagement and safety compliance. When these values conflict, and they will, the system's behavior enacts a value choice, whether or not that choice was made deliberately. This tension asks designers to make that negotiation visible and intentional.",
    steps: [
      "Map your stakeholders: who has a stake in how this system behaves during emotionally vulnerable moments?",
      "For each stakeholder, articulate what 'success' looks like, and where those definitions conflict.",
      "Identify which stakeholder's values are currently prioritized by your system's default behavior, and whether that prioritization was a conscious design decision.",
      "Build a value negotiation process into your design practice: surface conflicts early, document tradeoffs explicitly, and involve users in defining the boundaries of their own support.",
    ],
    time: "60 to 90 min",
    participants: "Cross functional team including users",
    materials: "Stakeholder map, value conflict matrix",
  },
];

let current = 0;
let flipped = false;
let isAnimating = false;

const stack = document.getElementById('cardStack');
const dotsEl = document.getElementById('dots');
const currentNumEl = document.getElementById('currentNum');
const totalNumEl = document.getElementById('totalNum');

totalNumEl.textContent = String(CARDS.length).padStart(2,'0');

function buildCard(data, index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = index;

  const nameHtml = data.name.replace('\n', '<br>');
  const stepsHtml = data.steps.map((s,i) =>
    `<li data-n="${i+1}">${s}</li>`
  ).join('');

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <div class="tag">${data.tag}</div>
        <span class="card-num">${String(index+1).padStart(2,'0')}</span>
        <div style="flex:1"></div>
        <div class="decorative-line"></div>
        <div class="method-name">${nameHtml}</div>
        <div class="method-tagline">${data.tagline}</div>
        <span class="flip-hint">tap to flip ↻</span>
      </div>
      <div class="card-back">
        <div class="back-header">
          <div>
            <div class="back-method-name">${data.name.replace('\n',' ')}</div>
            <div class="back-tag">${data.tag}</div>
          </div>
        </div>
        <div class="back-content">
          <div class="section-label">Overview</div>
          <div class="section-content">${data.overview}</div>
          <div class="section-label">Steps</div>
          <ul class="steps">${stepsHtml}</ul>
        </div>
        <div class="meta-row">
          <div class="meta-item">
            <div class="meta-label">Time</div>
            <div class="meta-val">${data.time}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Group</div>
            <div class="meta-val">${data.participants}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Materials</div>
            <div class="meta-val">${data.materials}</div>
          </div>
        </div>
      </div>
    </div>
  `;
  return card;
}

function renderDots() {
  dotsEl.innerHTML = '';
  CARDS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });
}

function updateCounter() {
  currentNumEl.textContent = String(current + 1).padStart(2,'0');
}

function renderStack() {
  stack.innerHTML = '';

  // Two decorative ghost cards for visual depth, no real content
  for (let i = 0; i < 2; i++) {
    const ghost = document.createElement('div');
    ghost.className = 'card ghost';
    ghost.innerHTML = '<div class="card-inner"><div class="card-front" style="pointer-events:none"></div></div>';
    stack.appendChild(ghost);
  }

  // Active card on top
  const card = buildCard(CARDS[current], current);
  card.classList.add('active');
  stack.appendChild(card);
  attachFlip(card);
  attachSwipe(card);

  renderDots();
  updateCounter();
  flipped = false;
}

function attachFlip(card) {
  card.addEventListener('click', (e) => {
    if (card.classList.contains('dragging')) return;
    flipped = !flipped;
    card.classList.toggle('flipped', flipped);
  });
}

function goTo(index) {
  if (isAnimating || index === current) return;
  isAnimating = true;

  const activeCard = stack.querySelector('.card.active');
  if (activeCard) {
    activeCard.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
    activeCard.style.opacity = '0';
    activeCard.style.transform = 'scale(0.97)';
    setTimeout(() => {
      current = index;
      renderStack();
      isAnimating = false;
    }, 220);
  } else {
    current = index;
    renderStack();
    isAnimating = false;
  }
}

function navigate(dir) {
  const activeCard = stack.querySelector('.card.active');
  if (!activeCard || isAnimating) return;
  isAnimating = true;

  const animClass = dir === 'next' ? 'swiping-left' : 'swiping-right';

  const nextIndex = dir === 'next'
    ? (current + 1) % CARDS.length
    : (current - 1 + CARDS.length) % CARDS.length;

  current = nextIndex;
  renderDots();
  updateCounter();

  // Pre-build the incoming card and slot it beneath the active card,
  // so it's revealed naturally as the outgoing card slides away.
  const newCard = buildCard(CARDS[current], current);
  newCard.style.cssText = [
    'z-index: 2;',
    'transform: rotate(0deg) scale(0.96);',
    'box-shadow: 0 24px 64px rgba(26,23,20,0.22), 0 4px 12px rgba(26,23,20,0.1);',
    'transition: transform 0.45s cubic-bezier(0.2,0,0,1);'
  ].join(' ');
  stack.insertBefore(newCard, activeCard);

  // Gently scale the incoming card up as the outgoing card slides away.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newCard.style.transform = 'rotate(0deg) scale(1)';
    });
  });

  // Pin the outgoing card on top and start its exit animation.
  activeCard.style.zIndex = '4';
  activeCard.classList.remove('active');
  activeCard.classList.add(animClass);

  setTimeout(() => {
    activeCard.remove();
    newCard.style.cssText = '';
    newCard.classList.add('active');
    attachFlip(newCard);
    attachSwipe(newCard);
    flipped = false;
    isAnimating = false;
  }, 420);
}

function attachSwipe(card) {
  let startX = 0, startY = 0, isDragging = false;
  let disableSwipe = false;
  const THRESHOLD = 80;

  function onStart(e) {
    disableSwipe = card.classList.contains('flipped') && !!e.target.closest('.card-back');
    if (disableSwipe) {
      startX = 0;
      startY = 0;
      isDragging = false;
      return;
    }
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX;
    startY = pt.clientY;
    isDragging = false;
  }

  function onMove(e) {
    if (disableSwipe) return;
    if (!startX) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX;
    const dy = pt.clientY - startY;
    if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) {
      isDragging = true;
      card.classList.add('dragging');
      const rot = dx * 0.04;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
    }
  }

  function onEnd(e) {
    if (disableSwipe) {
      disableSwipe = false;
      return;
    }
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = pt.clientX - startX;
    card.classList.remove('dragging');
    card.style.transform = '';
    startX = 0;

    if (isDragging && Math.abs(dx) > THRESHOLD) {
      navigate(dx < 0 ? 'next' : 'prev');
    }
    setTimeout(() => { isDragging = false; }, 50);
  }

  card.addEventListener('mousedown', onStart);
  card.addEventListener('mousemove', onMove);
  card.addEventListener('mouseup', onEnd);
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchmove', onMove, { passive: true });
  card.addEventListener('touchend', onEnd);
}

document.getElementById('nextBtn').addEventListener('click', () => navigate('next'));
document.getElementById('prevBtn').addEventListener('click', () => navigate('prev'));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate('next');
  if (e.key === 'ArrowLeft') navigate('prev');
  if (e.key === ' ' || e.key === 'Enter') {
    const a = stack.querySelector('.card.active');
    if (a) a.click();
  }
});

renderStack();

// ── Custom cursor ──
(function () {
  const dot  = document.createElement('div');
  const ring = document.createElement('div');
  dot.className  = 'cursor-dot';
  ring.className = 'cursor-ring';
  document.body.append(dot, ring);

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let ringX  = mouseX;
  let ringY  = mouseY;

  // Dot follows the cursor immediately
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    dot.style.left = mouseX + 'px';
    dot.style.top  = mouseY + 'px';
  });

  // Ring lags behind with lerp for a trailing feel
  (function animateRing() {
    ringX += (mouseX - ringX) * 0.18;
    ringY += (mouseY - ringY) * 0.18;
    ring.style.left = ringX + 'px';
    ring.style.top  = ringY + 'px';
    requestAnimationFrame(animateRing);
  })();

  // Expand ring on interactive elements (works for dynamically added cards too)
  document.addEventListener('mouseover', e => {
    ring.classList.toggle('hovering', !!e.target.closest('button, .card, .dot'));
  });

  // Pulse dot on click
  document.addEventListener('mousedown', () => dot.classList.add('clicking'));
  document.addEventListener('mouseup',   () => dot.classList.remove('clicking'));

  // Hide both when cursor leaves the window
  document.addEventListener('mouseleave', () => { dot.style.opacity = '0'; ring.style.opacity = '0'; });
  document.addEventListener('mouseenter', () => { dot.style.opacity = '1'; ring.style.opacity = '1'; });
})();
</script>
</body>
